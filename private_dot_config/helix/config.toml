theme = 'catppuccin_macchiato'

[editor]
line-number = "relative"
cursorline = true
color-modes = true
bufferline = "always"
jump-label-alphabet = "nretsiaupmodvh-g"
[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[editor.soft-wrap]
enable = true

[editor.file-picker]
hidden = false

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
# J = ["extend_to_line_bounds", "delete_selection", "paste_after"]
# K = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
p = "paste_before"
P = "paste_after"
X = "extend_line_above"
"minus" = "select_register"
C-s = ":w"
C-q = ":q"
ret = "goto_word"
A-S-up = [
  "extend_to_line_bounds",
  "delete_selection",
  "move_line_up",
  "paste_before",
]
A-S-down = ["extend_to_line_bounds", "delete_selection", "paste_after"]

[keys.normal.g]
x = ":buffer-close"
left = "goto_previous_buffer"
right = "goto_next_buffer"

[keys.normal.space]
F = "file_picker_in_current_buffer_directory"
p = "paste_clipboard_before"
P = "paste_clipboard_after"
b = [":sh git blame -L %{cursor_line},%{cursor_line} %{buffer_name}"]

[keys.select]
A-s = [":pipe sort"]

[keys.normal.space.","]
# y = ":sh zellij run -c -f -x 10% -y 10% --width 80% --height 80% -- bash helix-yazi-zellij open"
# g = ":sh zellij run -c -f -x 10% -y 10% --width 80% --height 80% -- gitui -t macchiato.ron"
y = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]

[keys.normal.space.c]
c = "@:sh<space>wl-copy<space><C-r>%<ret>"
f = "@:sh<space>basename<space><C-r>%<space>|<space>wl-copy<space>-n<ret>"
n = "@:sh<space>basename<space><C-r>%<space>|<space>cut<space>-d.<space>-f1<space>|<space>wl-copy<space>-n<ret>"
