[[language]]
name = "go"
auto-format = true
formatter = { command = "goimports" }

[[language]]
name = "markdown"
language-servers = [ "markdown-oxide", "marksman" ]

[[language]]
name = "python"
language-servers = ["ruff", "pylsp"]

[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.rust-analyzer.config.check]
command = "clippy"

[language-server.rust-analyzer.config.cargo]
features = "all"

[language-server.dbt-language-server]
command = "/home/theotime.poulain/dbt-language-server/dbt-language-server"
args = ["--debug"]

[[language]]
name = "sql"
scope = "dbt_project.yml"
file-types = ["sql","yml","yaml"]
language-servers = ["dbt-language-server"]
